version: '3.8'

services:
  backend:
    build: ./backend
    container_name: backend
    env_file:
      - .env
    networks:
      - app-network
    # Порт не публикуем наружу - только внутри сети

  nginx:
    build: ./nginx
    container_name: nginx-proxy
    ports:
      - "${NGINX_PORT:-80}:80"
    depends_on:
      - backend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge